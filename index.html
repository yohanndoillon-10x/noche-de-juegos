<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Noche de Juegos en Pareja</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dark: #0a0a0f;
      --bg-card: #1a1a2e;
      --bg-card-hover: #222244;
      --accent: #e94560;
      --accent-glow: rgba(233, 69, 96, 0.3);
      --accent-soft: #ff6b8a;
      --gold: #f0c040;
      --text: #f0e6ff;
      --text-dim: #8888aa;
      --success: #4ade80;
      --radius: 16px;
      --radius-sm: 10px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: var(--font);
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(233, 69, 96, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(120, 40, 200, 0.08) 0%, transparent 50%);
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes cardFlip { 0% { transform: rotateY(0); } 50% { transform: rotateY(90deg); } 100% { transform: rotateY(0); } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 20px var(--accent-glow); } 50% { box-shadow: 0 0 40px var(--accent-glow), 0 0 60px rgba(233, 69, 96, 0.15); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    @keyframes dotPulse { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    .animate-in { animation: fadeIn 0.5s ease-out forwards; }
    .animate-slide { animation: slideUp 0.6s ease-out forwards; }
    .animate-pulse { animation: pulse 2s infinite; }
    .animate-glow { animation: glow 2s infinite; }
    .animate-flip { animation: cardFlip 0.6s ease-in-out; }
    .animate-shake { animation: shake 0.3s ease-in-out; }
    .animate-float { animation: float 3s ease-in-out infinite; }

    #app {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    h1 { font-size: 1.8rem; font-weight: 700; text-align: center; margin-bottom: 8px; }
    h2 { font-size: 1.3rem; font-weight: 600; text-align: center; margin-bottom: 12px; }
    .subtitle { color: var(--text-dim); text-align: center; font-size: 0.9rem; margin-bottom: 24px; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 28px; border: none; border-radius: var(--radius-sm);
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: var(--transition); width: 100%; font-family: var(--font);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #c0392b);
      color: white;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--accent-glow); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary {
      background: var(--bg-card); color: var(--text); border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-secondary:hover { background: var(--bg-card-hover); border-color: var(--accent); }
    .btn-disabled { opacity: 0.4; pointer-events: none; }

    .input {
      width: 100%; padding: 14px 16px; background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm);
      color: var(--text); font-size: 1rem; font-family: var(--font);
      transition: var(--transition); outline: none;
    }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .input::placeholder { color: var(--text-dim); }

    .card {
      background: var(--bg-card); border-radius: var(--radius);
      padding: 20px; border: 1px solid rgba(255,255,255,0.05);
      transition: var(--transition);
    }

    .score-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; background: var(--bg-card); border-radius: var(--radius-sm);
      margin-bottom: 16px; font-size: 0.9rem;
    }
    .score-bar .score { font-weight: 700; color: var(--gold); }

    .spice-options { display: flex; gap: 8px; margin: 12px 0; }
    .spice-btn {
      flex: 1; padding: 12px 8px; border-radius: var(--radius-sm);
      border: 2px solid transparent; background: var(--bg-card);
      color: var(--text); cursor: pointer; text-align: center;
      font-size: 0.85rem; transition: var(--transition); font-family: var(--font);
    }
    .spice-btn.active { border-color: var(--accent); background: rgba(233, 69, 96, 0.15); }

    .canvas-container {
      background: #ffffff; border-radius: var(--radius-sm);
      overflow: hidden; touch-action: none; position: relative;
    }
    .canvas-container canvas { display: block; width: 100%; }

    .timer {
      font-size: 1.5rem; font-weight: 700; text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .timer.warning { color: var(--accent); }
    .timer.critical { color: var(--accent); animation: shake 0.3s infinite; }

    .tod-card {
      background: linear-gradient(135deg, var(--bg-card), #2a1a3e);
      border-radius: var(--radius); padding: 32px 24px;
      text-align: center; min-height: 200px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border: 1px solid rgba(233, 69, 96, 0.2);
    }
    .tod-card .card-type { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-soft); margin-bottom: 16px; }
    .tod-card .card-text { font-size: 1.2rem; line-height: 1.6; }

    .forfeit-card {
      background: linear-gradient(135deg, #2a0a1e, #1a0a2e);
      border: 2px solid var(--accent); border-radius: var(--radius);
      padding: 32px; text-align: center;
    }

    .guess-bar { display: flex; gap: 8px; margin-top: 12px; }
    .guess-bar .input { flex: 1; }
    .guess-bar .btn { width: auto; padding: 14px 20px; }

    .category-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; -webkit-overflow-scrolling: touch; }
    .category-tab {
      padding: 8px 14px; border-radius: 20px; font-size: 0.78rem;
      white-space: nowrap; border: 1px solid rgba(255,255,255,0.1);
      background: var(--bg-card); color: var(--text-dim); cursor: pointer;
      transition: var(--transition); font-family: var(--font);
    }
    .category-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

    .word-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
    .word-chip {
      padding: 6px 12px; background: rgba(233, 69, 96, 0.15);
      border-radius: 20px; font-size: 0.8rem; color: var(--accent-soft);
      display: flex; align-items: center; gap: 6px;
    }
    .word-chip button {
      background: none; border: none; color: var(--accent-soft);
      cursor: pointer; font-size: 1rem; line-height: 1; padding: 0;
    }

    .room-code {
      font-size: 2.5rem; font-weight: 800; letter-spacing: 12px;
      text-align: center; color: var(--accent); padding: 20px;
      font-variant-numeric: tabular-nums;
    }

    .color-picker { display: flex; gap: 6px; justify-content: center; margin: 8px 0; flex-wrap: wrap; }
    .color-dot {
      width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent;
      cursor: pointer; transition: var(--transition);
    }
    .color-dot.active { border-color: white; transform: scale(1.2); }

    .brush-sizes { display: flex; gap: 8px; justify-content: center; align-items: center; margin: 8px 0; }
    .brush-size {
      border-radius: 50%; background: var(--text); cursor: pointer;
      border: 2px solid transparent; transition: var(--transition);
    }
    .brush-size.active { border-color: var(--accent); }

    .gap-8 { display: flex; flex-direction: column; gap: 8px; }
    .gap-12 { display: flex; flex-direction: column; gap: 12px; }
    .gap-16 { display: flex; flex-direction: column; gap: 16px; }
    .gap-24 { display: flex; flex-direction: column; gap: 24px; }
    .text-center { text-align: center; }
    .mt-8 { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .mb-16 { margin-bottom: 16px; }

    .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
    .toggle {
      width: 48px; height: 26px; border-radius: 13px; border: none;
      background: rgba(255,255,255,0.15); cursor: pointer; position: relative;
      transition: var(--transition);
    }
    .toggle.active { background: var(--accent); }
    .toggle::after {
      content: ''; position: absolute; width: 20px; height: 20px;
      border-radius: 50%; background: white; top: 3px; left: 3px;
      transition: var(--transition);
    }
    .toggle.active::after { left: 25px; }

    .celebration {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.7); z-index: 100;
    }
    .celebration-content { text-align: center; animation: slideUp 0.5s ease-out; }
    .celebration-emoji { font-size: 4rem; margin-bottom: 16px; }

    .waiting-dots span { animation: dotPulse 1.4s infinite; }
    .waiting-dots span:nth-child(2) { animation-delay: 0.2s; }
    .waiting-dots span:nth-child(3) { animation-delay: 0.4s; }

    .back-btn {
      background: none; border: none; color: var(--text-dim); cursor: pointer;
      font-size: 0.9rem; padding: 8px 0; text-align: left; font-family: var(--font);
    }
    .back-btn:hover { color: var(--text); }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module" src="/src/main.jsx"></script>

</body>
</html>
